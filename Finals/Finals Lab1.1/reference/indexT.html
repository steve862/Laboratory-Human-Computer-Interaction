<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Orbitron:wght@400..900&family=Schoolbell&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        html{
            color: white;
            background-color: rgb(15, 15, 15);
            font-family: "Inter", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
        }
        p{
            color: white;
            transition: all 0.3s ease;
            padding: 10px;
            border: solid 1.5px rgba(255, 255, 255, 0);
            border-radius: 5px;
            margin: 5px;
        }
        .redBox{
            background-color: red;
            width: 200px;
            height: 200px;
            float: left;
        }
        .redBox:hover{
            border: solid 1.5px rgb(255, 255, 255);
            transform: scale(1.04);
        }
        .greenBox{
            background-color: green;
            width: 200px;
            height: 200px;
            float: left;
        }
        .greenBox:hover{
            border: solid 1.5px rgb(255, 255, 255);
            transform: scale(1.04);
        }
        .blueBox{
            background-color: blue;
            width: 200px;
            height: 200px;
            float: left;
        }
        .blueBox:hover{
            border: solid 1.5px rgb(255, 255, 255);
            transform: scale(1.04);
        }
    </style>
</head>
<body>
    <main>
        <h1>CSS Display practice</h1>
        <p class="redBox">Red box</p>
        <p class="greenBox">Green box</p>
        <p class="blueBox">Blue box</p>
    </main>   
</body>
</html>
